# Nginx config for the production frontend container.
#
# Two responsibilities:
#   1. Serve the React SPA: every unknown path falls back to /index.html so
#      client-side routes (e.g. /saved, /login) keep working on hard refresh.
#   2. Reverse-proxy /api/* to the backend FastAPI container. We strip the
#      /api prefix before forwarding so backend routes stay clean (the dev
#      Vite proxy does the same rewrite - keeping the two environments
#      consistent means no per-env code in the SPA).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip the JS / CSS bundle - the file sizes are small so this is a
    # tiny win, but it costs us nothing.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # Long-cache the fingerprinted Vite asset bundle. index.html stays
    # short-cache so deploys roll out immediately.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API calls to the backend service.
    #
    # We resolve `backend` via Docker's embedded DNS (127.0.0.11) at request
    # time, NOT at nginx startup. The literal `proxy_pass http://backend:...`
    # form caches the IP forever and panics with "host not found" when the
    # upstream isn't ready, which makes the container exit if the backend
    # boots a second after the frontend.
    #
    # The regex location captures the path after /api/ so we can rebuild the
    # URI explicitly (variable-based proxy_pass doesn't strip the location
    # prefix the way a literal one does).
    location ~ ^/api/(?<api_path>.*)$ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/$api_path$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback - any non-asset, non-/api path returns index.html so
    # React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
